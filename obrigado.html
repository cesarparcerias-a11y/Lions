<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obrigado — Lions Seminovos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="obrigado-page">

  <div class="obrigado-logo">
    <img src="Logo Lions.JPG" alt="Lions Seminovos" />
  </div>

  <div class="obrigado-icone">✓</div>

  <h1 class="obrigado-titulo">Indicação <span>recebida!</span></h1>

  <p class="obrigado-texto">
    Um consultor da <strong>Lions Seminovos</strong> vai entrar em contato com você em breve <strong>pelo WhatsApp</strong>.
  </p>

  <div class="consultor-card">
    <div class="consultor-img-wrapper">
      <img src="Logo Lions.JPG" alt="Contato oficial Lions Seminovos" />
    </div>
    <h3 class="consultor-aviso-titulo">Identifique o contato oficial</h3>
    <p class="consultor-aviso-texto">
      O consultor que vai te chamar usa <strong>esta foto de perfil</strong>.<br/>
      Desconfie de qualquer outro contato.
    </p>
  </div>

  <a href="index.html" class="btn-voltar">← Ver mais carros</a>
</main>
</body>
</html>
